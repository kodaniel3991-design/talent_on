<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent ON — 기업 매칭</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/dark.css">
<link rel="stylesheet" href="css/pages/company-search.css">
</head>
<body>

<div class="shell">

  <!-- ═══ SIDEBAR (common.js) ═══ -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- ═══════════ MAIN ═══════════ -->
  <div class="main-wrapper">

    <!-- GNB (common.js) -->
    <header class="gnb" id="gnb"></header>

    <!-- CONTENT -->
    <div class="content-area">

      <!-- FIXED: 검색 + 필터 (상단 고정) -->
      <div class="content-fixed">
        <div class="page-header" style="margin-bottom:14px">
          <h1>기업 매칭</h1>
          <p>AI가 분석한 달성 가능성 순으로 기업을 추천합니다</p>
        </div>
        <div class="search-bar">
        <div class="search-row">
          <div class="search-input-wrap">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <input type="text" class="search-input" placeholder="기업명, 산업, 직무 키워드로 검색...">
          </div>
          <button class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            검색
          </button>
        </div>
        <div class="filter-row">
          <select class="filter-select">
            <option>전체 산업</option>
            <option>에너지/플랜트</option>
            <option>방산/항공</option>
            <option>전자/가전</option>
            <option>조선/해양</option>
            <option>기계/자동차</option>
            <option>IT/소프트웨어</option>
            <option>화학/소재</option>
          </select>
          <select class="filter-select">
            <option>전체 규모</option>
            <option>대기업</option>
            <option>중견기업</option>
            <option>중소기업</option>
          </select>
          <select class="filter-select">
            <option>전체 지역</option>
            <option>창원 성산구</option>
            <option>창원 의창구</option>
            <option>창원 마산</option>
            <option>창원 진해구</option>
          </select>
          <div class="filter-divider"></div>
          <div class="filter-chips">
            <div class="filter-chip active" onclick="this.classList.toggle('active');filterCompanies()">채용 중</div>
            <div class="filter-chip" onclick="this.classList.toggle('active');filterCompanies()">인턴 모집</div>
            <div class="filter-chip" onclick="this.classList.toggle('active');filterCompanies()">AI 분석 완료</div>
          </div>
          <div class="result-count">총 <strong>52</strong>개 기업</div>
        </div>
      </div>

      <!-- TOOLBAR -->
      <div class="toolbar">
        <div class="toolbar-left">
          <select class="sort-select">
            <option>달성 가능성 높은 순</option>
            <option>이름 가나다순</option>
            <option>최근 업데이트순</option>
            <option>채용공고 많은 순</option>
          </select>
        </div>
        <div class="view-toggle" id="viewToggle">
          <button class="view-btn active" data-view="grid" onclick="switchView('grid')">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
          </button>
          <button class="view-btn" data-view="list" onclick="switchView('list')">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1 3h14M1 8h14M1 13h14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      </div><!-- /content-fixed -->

      <!-- SCROLLABLE: 카드 영역 -->
      <div class="content-scroll-area">

      <!-- ═══════════ GRID VIEW (렌더러로 생성) ═══════════ -->
      <div class="company-grid active" id="gridView"></div>

      <!-- ═══════════ LIST VIEW (렌더러로 생성) ═══════════ -->
      <div class="company-table-wrap" id="listView">
        <table>
          <thead>
            <tr><th>기업</th><th>산업</th><th>규모</th><th>인재상 키워드</th><th>채용 상태</th><th style="text-align:right">달성 가능성</th></tr>
          </thead>
          <tbody id="listViewBody"></tbody>
        </table>
      </div>

      <!-- PAGINATION -->
      <div class="pagination">
        <button class="page-btn nav">&lsaquo;</button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn">4</button>
        <button class="page-btn">5</button>
        <button class="page-btn nav">&rsaquo;</button>
      </div>

      </div><!-- /content-scroll-area -->
    </div><!-- /content-area -->
  </div><!-- /main-wrapper -->
</div><!-- /shell -->

<!-- Data & Renderers -->
<script src="data/companies.js"></script>
<script src="js/renderers.js"></script>
<script>
// 기업 데이터 렌더링
(function(){
  var companies = COMPANIES_DATA;
  window._companies = companies;
  renderCompanyGrid('gridView', companies);
  var tbody = document.getElementById('listViewBody');
  if(tbody) tbody.innerHTML = companies.map(renderCompanyRow).join('');
  var countEl = document.querySelector('.result-count strong');
  if(countEl) countEl.textContent = companies.length;
})();

// ═══ VIEW SWITCH ═══
function switchView(mode) {
  const grid = document.getElementById('gridView');
  const list = document.getElementById('listView');
  document.querySelectorAll('#viewToggle .view-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-view="'+mode+'"]').classList.add('active');
  grid.style.display = mode === 'grid' ? 'grid' : 'none';
  list.style.display = mode === 'list' ? 'block' : 'none';
}

// Pagination
document.querySelectorAll('.page-btn:not(.nav)').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});

// ═══ FILTER ═══
function filterCompanies(){
  var query = document.querySelector('.search-input').value.trim().toLowerCase();
  var selects = document.querySelectorAll('.filter-select');
  var industryFilter = selects[0] ? selects[0].value : '전체 산업';
  var sizeFilter = selects[1] ? selects[1].value : '전체 규모';
  var regionFilter = selects[2] ? selects[2].value : '전체 지역';
  var activeChips = [];
  document.querySelectorAll('.filter-chip.active').forEach(c => activeChips.push(c.textContent.trim()));
  var visibleCount = 0;

  document.querySelectorAll('.company-card, #listViewBody tr').forEach(function(el){
    var name = (el.dataset.name || '').toLowerCase();
    var industry = el.dataset.industry || '';
    var size = el.dataset.size || '';
    var location = el.dataset.location || '';
    var status = el.dataset.status || '';
    var show = true;
    if(query && name.indexOf(query)===-1 && industry.toLowerCase().indexOf(query)===-1) show=false;
    if(show && industryFilter!=='전체 산업' && industry.indexOf(industryFilter)===-1) show=false;
    if(show && sizeFilter!=='전체 규모' && size!==sizeFilter) show=false;
    if(show && regionFilter!=='전체 지역' && location.indexOf(regionFilter)===-1) show=false;
    if(show && activeChips.length > 0){
      var hasMatch = activeChips.some(c => status.indexOf(c)!==-1);
      if(!hasMatch) show=false;
    }
    el.style.display = show ? '' : 'none';
    if(show && el.classList.contains('company-card')) visibleCount++;
  });
  document.querySelector('.result-count strong').textContent = visibleCount;
}

// Wire filter events
document.querySelector('.search-input').addEventListener('keydown',function(e){if(e.key==='Enter')filterCompanies();});
document.querySelectorAll('.filter-select').forEach(s=>s.addEventListener('change',filterCompanies));
document.querySelector('.btn-primary').addEventListener('click',filterCompanies);
</script>

<!-- Common Components -->
<script src="js/common.js"></script>
<script>
renderSidebar('sidebar', STUDENT_MENU);
renderGNB('gnb', { breadcrumb: [{ label: '홈', href: 'S-02_dashboard.html' }, { label: '기업 매칭' }] });
</script>

</body>
</html>
